seed: 42
device: auto            # auto -> cuda > mps > cpu
paths:
  train_jsonl: data/processed/train.jsonl
  val_jsonl:   data/processed/val.jsonl
  test_jsonl:  data/processed/test.jsonl
  model_path:  data/models/best_model_deberta_finetune   # HF save_pretrained dir
  output_dir:  data/outputs_deberta_finetune
label_field: metadata.client_talk_type
training:
  model_name: microsoft/deberta-v3-base
  max_length: 128
  batch_size: 16          # DeBERTa-v3-base (184M params) fits at 16 on MPS
  epochs: 4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  patience: 2
  class_weighted_loss: true
