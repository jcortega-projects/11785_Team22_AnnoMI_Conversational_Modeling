seed: 42
device: auto
paths:
  train_jsonl:      data/processed/train_augmented_s200.jsonl
  val_jsonl:        data/processed/val.jsonl
  test_jsonl:       data/processed/test.jsonl
  train_embeddings: data/embeddings_aug_s200/train_embeddings.npy
  val_embeddings:   data/embeddings_aug_s200/val_embeddings.npy
  test_embeddings:  data/embeddings_aug_s200/test_embeddings.npy
  model_path:       data/models/best_model_aug_s200_nowt.pt
  output_dir:       data/outputs_aug_s200_nowt
label_field: metadata.client_talk_type
training:
  batch_size: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.4
  activation: relu
  learning_rate: 0.001
  weight_decay: 0.001
  epochs: 40
  patience: 6
  early_stopping_metric: f1_macro
  class_weighted_loss: false
  scheduler_factor: 0.5
  scheduler_patience: 2
