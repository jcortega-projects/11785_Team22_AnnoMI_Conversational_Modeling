seed: 42
device: auto            # auto -> cuda > mps > cpu
paths:
  train_jsonl: data/processed/train.jsonl
  val_jsonl:   data/processed/val.jsonl
  test_jsonl:  data/processed/test.jsonl
  model_path:  data/models/best_model_roberta_finetune   # HF save_pretrained dir
  output_dir:  data/outputs_roberta_finetune
label_field: metadata.client_talk_type
training:
  model_name: roberta-base
  max_length: 128         # AnnoMI utterances are short; 128 covers >99% without truncation
  batch_size: 16          # RoBERTa-base on MPS: 16 is the sweet spot
  epochs: 4
  learning_rate: 2.0e-5   # standard for transformer fine-tuning
  weight_decay: 0.01
  warmup_ratio: 0.1       # 10% of total steps
  max_grad_norm: 1.0
  patience: 2             # early stop if val f1 doesn't improve for 2 consecutive epochs
  class_weighted_loss: true
