seed: 42

paths:
  source_csv: AnnoMI/AnnoMI-simple.csv
  raw_dir: data/raw
  processed_dir: data/processed
  tokenized_dir: data/tokenized
  output_dir: data/outputs

data:
  dataset_name: annomi_simple
  copy_source_to_raw: true
  transcript_id_column: transcript_id
  utterance_id_column: utterance_id
  speaker_column: interlocutor
  text_column: utterance_text
  topic_column: topic
  mi_quality_column: mi_quality
  timestamp_column: timestamp
  transcript_metadata_fields:
    - video_title
    - video_url
  turn_attribute_fields:
    - main_therapist_behaviour
    - client_talk_type

# Task: predict client_talk_type for each client utterance.
# Targets are restricted to client utterances whose label is one of
# {change, neutral, sustain}. Therapist utterances may appear as causal
# context (controlled by context_turns) but are never target rows.
task:
  target: client_talk_type
  speaker: client
  allowed_labels: [change, neutral, sustain]
  context_turns: 0  # 0 = current client utterance only (clean baseline)

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify_by: mi_quality

tokenizer:
  type: whitespace
  hf_model_name: distilbert-base-uncased
  save_tokenized_splits: false

baseline:
  enabled: true
  label_field: metadata.client_talk_type
  scoring_split: val
  context_turns_sweep: [0, 2, 4]
  vocab_sizes: [1024, 2048, 4096]
  ngram_range: [1, 2]
  lowercase: true
  max_iter: 2000
  class_weight: balanced
