seed: 42

paths:
  source_csv: AnnoMI/AnnoMI-simple.csv
  raw_dir: data/raw
  processed_dir: data/processed
  tokenized_dir: data/tokenized
  output_dir: data/outputs

data:
  dataset_name: annomi_simple
  copy_source_to_raw: true
  transcript_id_column: transcript_id
  utterance_id_column: utterance_id
  speaker_column: interlocutor
  text_column: utterance_text
  topic_column: topic
  mi_quality_column: mi_quality
  timestamp_column: timestamp
  transcript_metadata_fields:
    - video_title
    - video_url
  turn_attribute_fields:
    - main_therapist_behaviour
    - client_talk_type

chunking:
  turns_per_chunk: 8
  overlap: 4
  min_turns: 4
  include_partial_final_chunk: true

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify_by: mi_quality

tokenizer:
  type: whitespace
  hf_model_name: distilbert-base-uncased
  save_tokenized_splits: true

baseline:
  enabled: true
  label_field: metadata.therapist_behavior_mode
  scoring_split: val
  chunk_window_sizes: [4, 6, 8, 10]
  overlap_ratio: 0.5
  vocab_sizes: [512, 1024, 2048]
  lowercase: true
  ngram_range: [1, 2]
  max_iter: 1000
  class_weight: balanced
