seed: 42
device: auto            # auto -> cuda > mps > cpu
paths:
  train_jsonl: data/processed/train.jsonl
  val_jsonl:   data/processed/val.jsonl
  test_jsonl:  data/processed/test.jsonl
  model_path:  data/models/best_model_modernbert_finetune   # HF save_pretrained dir
  output_dir:  data/outputs_modernbert_finetune
label_field: metadata.client_talk_type
training:
  model_name: answerdotai/ModernBERT-base
  max_length: 128         # AnnoMI utterances are short; ModernBERT supports up to 8192 but we don't need it
  batch_size: 16
  epochs: 4
  learning_rate: 2.0e-5   # same as RoBERTa/DeBERTa runs — isolate model-arch variable
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  patience: 2
  class_weighted_loss: true
