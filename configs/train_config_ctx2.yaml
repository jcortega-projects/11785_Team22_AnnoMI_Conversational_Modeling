seed: 42
device: auto
paths:
  train_jsonl:      data/processed_ctx2/train.jsonl
  val_jsonl:        data/processed_ctx2/val.jsonl
  test_jsonl:       data/processed_ctx2/test.jsonl
  train_embeddings: data/embeddings_ctx2/train_embeddings.npy
  val_embeddings:   data/embeddings_ctx2/val_embeddings.npy
  test_embeddings:  data/embeddings_ctx2/test_embeddings.npy
  model_path:       data/models/best_model_ctx2.pt
  output_dir:       data/outputs_ctx2
label_field: metadata.client_talk_type
training:
  batch_size: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.4
  activation: relu
  learning_rate: 0.001
  weight_decay: 0.001
  epochs: 40
  patience: 6
  early_stopping_metric: f1_macro
  class_weighted_loss: true
  scheduler_factor: 0.5
  scheduler_patience: 2
